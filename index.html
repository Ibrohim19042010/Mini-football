<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Football Pro - Ultimate</title>
    <style>
        body { margin: 0; background: #0b0e14; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .tab-content { display: none; flex: 1; overflow-y: auto; padding: 10px; }
        .active-tab { display: flex; flex-direction: column; }

        /* JAMOA VA ZAXIRA */
        .roster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .player-card { background: #1c2833; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #34495e; position: relative; }
        .player-img { width: 45px; height: 45px; border-radius: 50%; background: #555; margin-bottom: 5px; object-fit: cover; }
        .sell-btn { background: #e74c3c; border: none; color: white; padding: 4px; border-radius: 4px; font-size: 9px; cursor: pointer; }

        /* O'YNASH MAYDONI (Joystick bilan) */
        #game-field { flex: 1; background: #27ae60; position: relative; overflow: hidden; border: 2px solid #fff; }
        .player-3d { width: 25px; height: 25px; background: #3498db; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); border: 2px solid #fff; }
        #controls { height: 130px; background: #111; display: flex; align-items: center; justify-content: space-around; }
        #joystick { width: 80px; height: 80px; background: #333; border-radius: 50%; position: relative; }
        #knob { width: 30px; height: 30px; background: #fff; border-radius: 50%; position: absolute; top: 25px; left: 25px; }

        /* TRANSFER */
        .pack-btn { padding: 15px; margin: 10px; background: #f1c40f; border: none; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body>

    <div style="background:#000; padding:10px; display:flex; justify-content:space-between;">
        <span>Balans: <b id="balance">1000</b> 💰</span>
        <span>Jamoa: <b id="count">2</b>/15</span>
    </div>

    <!-- 1. JAMOAM -->
    <div id="tab-team" class="tab-content active-tab">
        <h3>Asosiy Tarkib</h3>
        <div id="main-roster" class="roster-grid"></div>
        <h3>Zaxira (Sotilishi mumkin)</h3>
        <div id="bench-roster" class="roster-grid"></div>
    </div>

    <!-- 2. O'YNASH -->
    <div id="tab-play" class="tab-content">
        <div id="game-field">
            <div id="player-main" class="player-3d" style="top:50%; left:50%;"></div>
        </div>
        <div id="controls">
            <div id="joystick"><div id="knob"></div></div>
            <button>Pass</button><button>Shoot</button>
        </div>
    </div>

    <!-- 3. TRANSFER -->
    <div id="tab-transfer" class="tab-content">
        <button class="pack-btn" onclick="buyPack(1)">1x Pack (150💰)</button>
        <button class="pack-btn" onclick="buyPack(3)">3x Pack (400💰)</button>
    </div>

    <div style="display:flex; justify-content:space-around; background:#111; padding:10px;">
        <button onclick="switchTab('tab-team')">Jamoam</button>
        <button onclick="switchTab('tab-play')">O'ynash</button>
        <button onclick="switchTab('tab-transfer')">Transfer</button>
    </div>

    <script>
        let balance = 1000;
        let myPlayers = [
            {name: "Abbos", img: "abbos.jpg", ovr: 85},
            {name: "Eldor", img: "eldor.jpg", ovr: 86}
        ];

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
        }

        function renderRoster() {
            const bench = document.getElementById('bench-roster');
            bench.innerHTML = "";
            myPlayers.forEach((p, index) => {
                bench.innerHTML += `
                    <div class="player-card">
                        <img src="${p.img}" class="player-img">
                        <div>${p.name}</div>
                        <button class="sell-btn" onclick="sellPlayer(${index})">Sotish (50💰)</button>
                    </div>`;
            });
            document.getElementById('balance').innerText = balance;
            document.getElementById('count').innerText = myPlayers.length;
        }

        function buyPack(amount) {
            if (myPlayers.length + amount > 15) return alert("Joy yo'q!");
            if (balance < (amount === 1 ? 150 : 400)) return alert("Pul yetmaydi!");
            
            balance -= (amount === 1 ? 150 : 400);
            for(let i=0; i<amount; i++) myPlayers.push({name: "Yangi O'yinchi", img: "player.jpg", ovr: 75});
            renderRoster();
        }

        function sellPlayer(index) {
            myPlayers.splice(index, 1);
            balance += 50;
            renderRoster();
        }

        renderRoster();
    </script>
</body>
            </html>
