<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Football Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0e1621;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 15px 15px 90px 15px;
            box-sizing: border-box;
        }

        /* Yuqori panel: Balans */
        .top-bar {
            width: 100%;
            max-width: 350px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #17212b;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            border: 1px solid #24303f;
            box-sizing: border-box;
        }
        .balance { font-size: 18px; font-weight: bold; color: #f1c40f; }

        /* Oynalar */
        .tab-content {
            display: none; width: 100%; max-width: 350px; flex-direction: column; align-items: center; animation: fadeIn 0.3s ease;
        }
        .active-tab { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Jamoa sarlavhasi */
        .team-header {
            display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px;
        }
        .team-name { font-weight: bold; font-size: 18px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .team-ovr { font-weight: bold; font-size: 16px; color: #f1c40f; background: rgba(23, 33, 43, 0.8); padding: 5px 12px; border-radius: 8px; border: 1px solid #f1c40f; }

        /* Futbol Maydoni (Pitch) */
        .pitch {
            width: 100%;
            height: 340px;
            background: repeating-linear-gradient(0deg, #27ae60, #27ae60 40px, #2ecc71 40px, #2ecc71 80px);
            border: 3px solid #ffffff;
            border-radius: 8px;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.4), 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        
        .center-circle { width: 70px; height: 70px; border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .center-line { width: 100%; height: 2px; background: rgba(255,255,255,0.6); position: absolute; top: 50%; left: 0; }
        .penalty-box-top { width: 120px; height: 50px; border: 2px solid rgba(255,255,255,0.6); position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-top: none; }
        .penalty-box-bottom { width: 120px; height: 50px; border: 2px solid rgba(255,255,255,0.6); position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); border-bottom: none; }

        /* O'yinchi pozitsiyalari */
        .player-slot {
            position: absolute; width: 60px; background: linear-gradient(135deg, #17212b, #0e1621); border: 2px solid #f1c40f; border-radius: 6px; text-align: center; padding: 4px 2px; transform: translateX(-50%); box-shadow: 0 4px 8px rgba(0,0,0,0.6); transition: 0.2s;
        }
        .player-slot:active { transform: translateX(-50%) scale(0.9); }
        .slot-ovr { color: #f1c40f; font-weight: 900; font-size: 13px; }
        .slot-emoji { font-size: 22px; margin: 2px 0; }
        .slot-name { color: #ffffff; font-size: 9px; font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 2px;}

        /* Joylashuvlar */
        .slot-st { top: 8%; left: 50%; }
        .slot-mid { top: 35%; left: 50%; }
        .slot-def { top: 62%; left: 50%; }
        .slot-gk { top: 85%; left: 50%; }

        .btn-pack {
            background: linear-gradient(90deg, #2ecc71, #27ae60); color: white; border: none; padding: 14px 30px; font-size: 15px; font-weight: bold; border-radius: 25px; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); width: 100%; cursor: pointer;
        }

        /* O'ynash va Transfer */
        .page-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; color: #3498db; }
        .placeholder-box { background: #17212b; width: 100%; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #24303f; box-sizing: border-box; }
        .btn-match { background: linear-gradient(90deg, #e74c3c, #c0392b); color: white; border: none; padding: 14px 40px; font-size: 16px; font-weight: bold; border-radius: 12px; margin-top: 20px; cursor: pointer; width: 100%; }

        /* Nav Bar */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #17212b; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #24303f; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #7f8c8d; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 33%; }
        .nav-item span { font-size: 22px; margin-bottom: 4px; }
        .nav-item.active-nav { color: #3498db; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span style="color: #8899a6;">Balans:</span>
        <span class="balance" id="coin-balance">💰 1000</span>
    </div>

    <div id="tab-squad" class="tab-content active-tab">
        <div class="team-header">
            <div class="team-name" id="team-name-display">FC THE END</div>
            <div class="team-ovr">OVR: <span id="team-ovr-display">84</span></div>
        </div>
        
        <div class="pitch">
            <div class="center-circle"></div>
            <div class="center-line"></div>
            <div class="penalty-box-top"></div>
            <div class="penalty-box-bottom"></div>

            <div class="player-slot slot-st">
                <div class="slot-ovr" id="st-ovr">88</div>
                <div class="slot-emoji" id="st-emoji">🏃‍♂️</div>
                <div class="slot-name" id="st-name">B. LEE</div>
            </div>
            
            <div class="player-slot slot-mid">
                <div class="slot-ovr" id="mid-ovr">85</div>
                <div class="slot-emoji" id="mid-emoji">💎</div>
                <div class="slot-name" id="mid-name">BELLINGHAM</div>
            </div>
            
            <div class="player-slot slot-def">
                <div class="slot-ovr" id="def-ovr">84</div>
                <div class="slot-emoji" id="def-emoji">🧱</div>
                <div class="slot-name" id="def-name">VAN DIJK</div>
            </div>
            
            <div class="player-slot slot-gk">
                <div class="slot-ovr" id="gk-ovr">80</div>
                <div class="slot-emoji" id="gk-emoji">🧤</div>
                <div class="slot-name" id="gk-name">ALISSON</div>
            </div>
        </div>

        <button class="btn-pack" onclick="openPack()">🎁 YANGI O'YINCHI (150 💰)</button>
    </div>

    <div id="tab-play" class="tab-content">
        <div class="page-title">🎮 4x4 MATCH</div>
        <div class="placeholder-box">
            <p style="color: #8899a6;">Jamoangiz OVR kuchi 84. Raqib topish va o'yinni boshlash uchun pastdagi tugmani bosing.</p>
            <div style="font-size: 50px; margin: 20px 0;">🏟️</div>
            <button class="btn-match" onclick="startMatch()">⚔️ O'YINNI BOSHLASH</button>
        </div>
    </div>

    <div id="tab-transfer" class="tab-content">
        <div class="page-title">🔄 BOZOR</div>
        <div class="placeholder-box">
            <p style="color: #8899a6;">Transfer bozori tez orada ishga tushadi.</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-nav" id="nav-squad" onclick="switchTab('squad')">
            <span>🛡️</span>Jamoam
        </div>
        <div class="nav-item" id="nav-play" onclick="switchTab('play')">
            <span>🎮</span>O'ynash
        </div>
        <div class="nav-item" id="nav-transfer" onclick="switchTab('transfer')">
            <span>🔄</span>Transfer
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let coins = 1000;
        const user = tg.initDataUnsafe ? tg.initDataUnsafe.user : null;
        
        // Agar xohlasangiz jamoa nomini foydalanuvchi ismiga o'zgartirishimiz mumkin, hozircha professional FC THE END turibdi
        // if (user) { document.getElementById('team-name-display').innerText = "FC " + user.first_name.toUpperCase(); }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active-tab'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active-nav'));

            document.getElementById('tab-' + tabName).classList.add('active-tab');
            document.getElementById('nav-' + tabName).classList.add('active-nav');
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        const playersDataset = [
            { name: "RONALDO", ovr: 92, pos: "ST", emoji: "🐐" },
            { name: "MESSI", ovr: 91, pos: "ST", emoji: "👽" },
            { name: "KANTE", ovr: 86, pos: "MID", emoji: "🏃🏾‍♂️" },
            { name: "RAMOS", ovr: 88, pos: "DEF", emoji: "🐂" },
            { name: "NEUER", ovr: 89, pos: "GK", emoji: "🧱" }
        ];

        function openPack() {
            if (coins >= 150) {
                coins -= 150;
                document.getElementById('coin-balance').innerText = "💰 " + coins;
                const rp = playersDataset[Math.floor(Math.random() * playersDataset.length)];
                
                // Chiqqan o'yinchini pozitsiyasiga qarab joylash
                if(rp.pos === "ST") { updateSlot('st', rp); }
                else if(rp.pos === "MID") { updateSlot('mid', rp); }
                else if(rp.pos === "DEF") { updateSlot('def', rp); }
                else if(rp.pos === "GK") { updateSlot('gk', rp); }

                alert("Tabriklaymiz! Jamoangizga qo'shildi: " + rp.name + " (OVR " + rp.ovr + ")");
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                alert("Mablag' yetarli emas!");
            }
        }

        function updateSlot(slot, player) {
            document.getElementById(slot + '-name').innerText = player.name;
            document.getElementById(slot + '-ovr').innerText = player.ovr;
            document.getElementById(slot + '-emoji').innerText = player.emoji;
            // Eslatma: OVR ni qayta hisoblash tizimini keyinroq qo'shamiz
        }

        function startMatch() { alert("Match qismi tayyorlanyapti!"); }
    </script>
</body>
            </html>
