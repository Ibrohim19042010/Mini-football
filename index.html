<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Football Card</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-card {
            background: linear-gradient(135deg, #gold, #bf953f, #fcf6ba, #b38728, #fbf5b7);
            border: 4px solid #fff;
            border-radius: 15px;
            width: 200px;
            height: 300px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
            color: #111;
            text-align: center;
            padding: 15px;
        }
        .rating {
            font-size: 32px;
            font-weight: bold;
            position: absolute;
            top: 15px;
            left: 15px;
        }
        .position {
            position: absolute;
            top: 50px;
            left: 15px;
            font-weight: bold;
            font-size: 14px;
        }
        .player-photo {
            font-size: 70px;
            margin-top: 30px;
        }
        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
            text-transform: uppercase;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            font-size: 14px;
            font-weight: bold;
            background: rgba(255,255,255,0.5);
            padding: 5px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="rating">88</div>
        <div class="position">ST (HJ)</div>
        <div class="player-photo">🏃‍♂️</div>
        <div class="player-name">B. Lee</div>
        
        <div class="stats">
            <div>TEZ: 95</div>
            <div>ZAR: 89</div>
            <div>PAS: 82</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
  </html>
