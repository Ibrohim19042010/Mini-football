<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Football Pro - Ultimate</title>
    <style>
        body { margin: 0; padding: 0; background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; touch-action: none; }

        /* ================= TOP BAR ================= */
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 55px; background: #111622; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #1f293d; z-index: 10000; box-sizing: border-box; }
        .balance-box { background: #172030; padding: 8px 15px; border-radius: 20px; font-weight: bold; color: #f1c40f; font-size: 14px; border: 1px solid #2c3e50; }
        .limit-box { background: #2c3e50; color: #fff; font-weight: bold; padding: 6px 12px; border-radius: 8px; font-size: 13px; }

        /* ================= ASOSIY OYNA (SCROLL UCHUN) ================= */
        #main-container { margin-top: 55px; height: calc(100vh - 120px); overflow-y: auto; position: relative; }
        .tab-content { display: none; padding: 15px; padding-bottom: 30px; }
        .active-tab { display: block; }
        
        /* 1. JAMOAM VA ZAXIRA */
        .section-title { font-size: 15px; font-weight: bold; color: #3498db; margin: 10px 0; border-left: 4px solid #3498db; padding-left: 8px; }
        .roster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .player-card { background: linear-gradient(135deg, #1e272e, #2c3e50); border: 2px solid #f1c40f; border-radius: 8px; text-align: center; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .card-ovr { background: #f1c40f; color: #000; font-weight: bold; font-size: 12px; padding: 2px 0; }
        .card-img { height: 60px; background: #353b48; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-name { font-size: 10px; padding: 4px; font-weight: bold; background: #1a1f29; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-sell { background: #e74c3c; color: white; border: none; font-size: 11px; padding: 6px 0; cursor: pointer; font-weight: bold; width: 100%; display: block; }

        /* 2. O'YNASH MAYDONI (3D INSONLAR) */
        #tab-play { padding: 0; display: none; height: 100%; flex-direction: column; }
        #tab-play.active-tab { display: flex; }
        
        #game-field { flex: 1; background: repeating-linear-gradient(0deg, #219653, #219653 10%, #27ae60 10%, #27ae60 20%); position: relative; overflow: hidden; }
        .center-line { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.5); transform: translateY(-50%); }
        .center-circle { position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
        .goal { position: absolute; left: 50%; transform: translateX(-50%); width: 100px; height: 20px; border: 3px solid rgba(255,255,255,0.8); }
        .goal-top { top: 0; border-top: none; }
        .goal-bottom { bottom: 0; border-bottom: none; }

        /* 3D Inson Modeli */
        .human-player { width: 30px; height: 45px; position: absolute; transform: translate(-50%, -50%); z-index: 5; display: flex; flex-direction: column; align-items: center; }
        .human-head { width: 14px; height: 14px; background: #ffdbac; border-radius: 50%; position: relative; }
        .human-hair { width: 16px; height: 6px; background: #2c3e50; border-radius: 8px 8px 0 0; position: absolute; top: -2px; left: -1px; }
        .human-body { width: 22px; height: 24px; background: linear-gradient(to bottom, #3498db, #2980b9); border-radius: 5px 5px 2px 2px; margin-top: -1px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; color: white; box-shadow: 0 3px 5px rgba(0,0,0,0.4); }
        .opp-human .human-body { background: linear-gradient(to bottom, #e74c3c, #c0392b); }
        .opp-human .human-hair { background: #111; }
        
        .running { animation: runAnim 0.3s infinite alternate ease-in-out; }
        @keyframes runAnim { 0% { transform: translate(-50%, -50%) rotate(5deg) scaleY(0.95); } 100% { transform: translate(-50%, -50%) rotate(-5deg) scaleY(1.05); } }

        #active-player { z-index: 10; }
        #active-player .human-body { background: linear-gradient(to bottom, #f1c40f, #f39c12); color: black; }

        .ball { width: 16px; height: 16px; position: absolute; transform: translate(-50%, -50%); z-index: 12; border-radius: 50%; background: #fff; background-image: radial-gradient(circle at 35% 35%, #ffffff 0%, #e0e0e0 50%, #888888 100%); box-shadow: 2px 4px 6px rgba(0,0,0,0.5); border: 1px solid #333; transition: all 0.15s linear; }
        .ball::before { content: "⚽"; position: absolute; top: -2px; left: -1px; font-size: 15px; }

        /* Boshqaruv */
        #controls { height: 120px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: #111; border-top: 1px solid #333; }
        #joystick-area { width: 90px; height: 90px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; border: 2px solid rgba(255,255,255,0.2); }
        #joystick-knob { width: 35px; height: 35px; background: rgba(255,255,255,0.5); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .action-btns button { width: 55px; height: 55px; border-radius: 50%; border: none; background: rgba(255,255,255,0.2); color: white; font-size: 14px; font-weight: bold; margin-left: 10px; }

        /* 3. TRANSFER */
        .pack-box { background: linear-gradient(145deg, #2c3e50, #1a252f); border: 2px solid #f1c40f; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .pack-box.mega { border-color: #e74c3c; background: linear-gradient(145deg, #34495e, #1e272e); }
        .pack-btn-buy { background: #f1c40f; color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; margin-top: 10px; width: 100%; font-size: 16px; }

        #pack-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 20000; align-items: center; justify-content: center; flex-direction: column; }

        /* ================= PASTKI NAVIGATSIYA (FIXED) ================= */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #0b0e14; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1f293d; z-index: 10000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: #7f8c8d; width: 33%; cursor: pointer; }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
        .active-nav { color: #3498db; font-weight: bold; }
        .active-nav .nav-icon { transform: scale(1.2); }
    </style>
</head>
<body>

    <!-- TEPADAGI PANEL -->
    <div id="top-bar">
        <div class="balance-box">💰 <span id="user-balance">1000</span></div>
        <div class="limit-box">Jamoa: <span id="squad-count">5</span>/15</div>
    </div>

    <!-- MARKAZIY QISM -->
    <div id="main-container">
        
        <!-- 1. JAMOAM -->
        <div id="tab-team" class="tab-content active-tab">
            <div class="section-title">ASOSIY TARKIB</div>
            <div id="main-grid" class="roster-grid"></div>
            
            <div class="section-title">ZAXIRA (SOTISH MUMKIN)</div>
            <div id="bench-grid" class="roster-grid"></div>
        </div>

        <!-- 2. O'YNASH -->
        <div id="tab-play" class="tab-content">
            <div id="game-field">
                <div class="center-line"></div><div class="center-circle"></div>
                <div class="goal goal-top"></div><div class="goal goal-bottom"></div>
                
                <div class="ball" id="match-ball"></div>

                <!-- Jamoamiz -->
                <div class="human-player" style="top: 80%; left: 50%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">GK</div></div>
                <div class="human-player" style="top: 65%; left: 30%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">DF</div></div>
                <div class="human-player" style="top: 65%; left: 70%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">DF</div></div>
                
                <!-- Boshqariladigan -->
                <div class="human-player" id="active-player" style="top: 55%; left: 50%;">
                    <div class="human-head"><div class="human-hair" style="background:#d35400;"></div></div>
                    <div class="human-body">10</div>
                </div>

                <!-- Raqib -->
                <div class="human-player opp-human" style="top: 20%; left: 50%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">GK</div></div>
                <div class="human-player opp-human" style="top: 40%; left: 40%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">MD</div></div>
            </div>
            
            <!-- Boshqaruv -->
            <div id="controls">
                <div id="joystick-area"><div id="joystick-knob"></div></div>
                <div class="action-btns">
                    <button onclick="passBall()">Pass</button>
                    <button onclick="shootBall()" style="background:rgba(231,76,60,0.5);">Zarba</button>
                </div>
            </div>
        </div>

        <!-- 3. TRANSFER -->
        <div id="tab-transfer" class="tab-content">
            <div class="pack-box">
                <div style="font-size:40px;">📦</div>
                <h3>1x STANDART PACK</h3>
                <button class="pack-btn-buy" onclick="buyPack(1, 150)">150 💰 Sotib olish</button>
            </div>
            <div class="pack-box mega">
                <div style="font-size:40px;">🔥</div>
                <h3 style="color:#e74c3c;">3x PREMIUM PACK</h3>
                <button class="pack-btn-buy" style="background:#e74c3c; color:white;" onclick="buyPack(3, 400)">400 💰 Sotib olish</button>
            </div>
        </div>

    </div> <!-- Main Container End -->

    <!-- PASTKI MENYU -->
    <div class="nav-bar">
        <div class="nav-item active-nav" onclick="switchTab('tab-team', this)">
            <div class="nav-icon">🛡️</div><span>Jamoam</span>
        </div>
        <div class="nav-item" onclick="switchTab('tab-play', this)">
            <div class="nav-icon">⚽</div><span>O'ynash</span>
        </div>
        <div class="nav-item" onclick="switchTab('tab-transfer', this)">
            <div class="nav-icon">🔄</div><span>Transfer</span>
        </div>
    </div>

    <!-- PACK MODAL -->
    <div id="pack-modal">
        <h2 style="color: #f1c40f;">YANGI O'YINCHI!</h2>
        <div id="modal-cards" style="display:flex; gap:10px; margin:20px 0;"></div>
        <button style="padding:10px 30px; background:#3498db; color:white; border:none; border-radius:20px; font-weight:bold; font-size:16px;" onclick="closeModal()">Davom etish</button>
    </div>

    <script>
        let balance = 1000;
        let mainSquad = [
            { name: "SHOMURODOV", ovr: 86, img: "eldor.jpg" },
            { name: "FAYZULLAYEV", ovr: 85, img: "abbos.jpg" },
            { name: "MASHARIPOV", ovr: 83, img: "masharipov.jpg" }
        ];
        let benchSquad = [];
        const pool = [
            { name: "URUNOV", ovr: 81, img: "urunov.jpg", price: 60 },
            { name: "SHUKUROV", ovr: 82, img: "shukurov.jpg", price: 70 },
            { name: "KHUSANOV", ovr: 84, img: "khusanov.jpg", price: 90 },
            { name: "SAYFIEV", ovr: 77, img: "sayfiev.jpg", price: 40 }
        ];

        // --- TABLARNI ALMASHTIRISH ---
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active-tab');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            element.classList.add('active-nav');
        }

        // --- RENDER JAMOAM ---
        function renderSquad() {
            const mainHTML = mainSquad.map(p => `
                <div class="player-card">
                    <div class="card-ovr">${p.ovr}</div>
                    <div class="card-img"><img src="${p.img}" onerror="this.src='https://api.dicebear.com/7.x/adventurer/svg?seed=${p.name}'"></div>
                    <div class="card-name">${p.name}</div>
                </div>`).join('');
            document.getElementById('main-grid').innerHTML = mainHTML;

            const benchHTML = benchSquad.map((p, i) => `
                <div class="player-card" style="border-color:#3498db;">
                    <div class="card-ovr" style="background:#3498db; color:white;">${p.ovr}</div>
                    <div class="card-img"><img src="${p.img}" onerror="this.src='https://api.dicebear.com/7.x/adventurer/svg?seed=${p.name}'"></div>
                    <div class="card-name">${p.name}</div>
                    <button class="btn-sell" onclick="sellPlayer(${i})">${p.price}💰 Sotish</button>
                </div>`).join('');
            document.getElementById('bench-grid').innerHTML = benchHTML;

            document.getElementById('user-balance').innerText = balance;
            document.getElementById('squad-count').innerText = mainSquad.length + benchSquad.length;
        }

        // --- PACK OCHISH ---
        function buyPack(count, price) {
            if (mainSquad.length + benchSquad.length + count > 15) return alert("Limit 15 ta! Ortiqcha o'yinchilarni soting.");
            if (balance < price) return alert("Mablag' yetarli emas!");
            
            balance -= price;
            let modalHTML = "";
            for(let i=0; i<count; i++) {
                let p = {...pool[Math.floor(Math.random() * pool.length)]};
                benchSquad.push(p);
                modalHTML += `
                    <div class="player-card" style="width:80px;">
                        <div class="card-ovr">${p.ovr}</div>
                        <div class="card-img"><img src="${p.img}" onerror="this.src='https://api.dicebear.com/7.x/adventurer/svg?seed=${p.name}'"></div>
                        <div class="card-name">${p.name}</div>
                    </div>`;
            }
            document.getElementById('modal-cards').innerHTML = modalHTML;
            document.getElementById('pack-modal').style.display = 'flex';
            renderSquad();
        }

        function closeModal() { document.getElementById('pack-modal').style.display = 'none'; }
        function sellPlayer(index) { balance += benchSquad[index].price; benchSquad.splice(index, 1); renderSquad(); }

        // --- O'YIN JOYSTICK (TELEFON UCHUN ISHONCHLI) ---
        const joyArea = document.getElementById('joystick-area');
        const joyKnob = document.getElementById('joystick-knob');
        const player = document.getElementById('active-player');
        const ball = document.getElementById('match-ball');
        
        let isDragging = false, joyCx, joyCy, px = 50, py = 55, hasBall = true;

        joyArea.addEventListener('touchstart', (e) => {
            isDragging = true;
            const rect = joyArea.getBoundingClientRect();
            joyCx = rect.left + rect.width / 2; joyCy = rect.top + rect.height / 2;
            player.classList.add('running');
        }, {passive: true});

        joyArea.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let dx = e.touches[0].clientX - joyCx, dy = e.touches[0].clientY - joyCy;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 35) { dx = (dx/dist)*35; dy = (dy/dist)*35; }
            joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

            px += dx * 0.05; py += dy * 0.05;
            px = Math.max(5, Math.min(95, px)); py = Math.max(5, Math.min(95, py));
            player.style.left = px + "%"; player.style.top = py + "%";
            
            if(hasBall) { ball.style.left = px + "%"; ball.style.top = (py - 3) + "%"; }
        }, {passive: true});

        joyArea.addEventListener('touchend', () => {
            isDragging = false; joyKnob.style.transform = `translate(-50%, -50%)`; player.classList.remove('running');
        });

        function shootBall() { if(hasBall) { hasBall=false; ball.style.top="5%"; ball.style.left="50%"; setTimeout(()=>{alert("Zarba! ⚽"); resetBall();}, 600); } }
        function passBall() { if(hasBall) { hasBall=false; ball.style.left="20%"; ball.style.top="65%"; setTimeout(resetBall, 800); } }
        function resetBall() { hasBall=true; px=50; py=55; player.style.left="50%"; player.style.top="55%"; ball.style.left="50%"; ball.style.top="52%"; }

        renderSquad();
    </script>
</body>
                                                                           </html>
