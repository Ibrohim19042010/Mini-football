<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Football Pro</title>
    <style>
        body { margin: 0; background: #0b0e14; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #top-bar { position: fixed; top: 0; width: 100%; height: 55px; background: #111622; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; box-sizing: border-box; }
        #main-container { margin-top: 55px; height: calc(100vh - 120px); overflow-y: auto; }
        .tab-content { display: none; padding: 15px; }
        .active-tab { display: block; }
        .squad-pitch { background: #27ae60; height: 350px; border-radius: 12px; position: relative; border: 2px solid white; margin-bottom: 20px; }
        .pitch-card { position: absolute; width: 60px; transform: translateX(-50%); background: #1c2833; border: 2px solid #f1c40f; border-radius: 8px; text-align: center; }
        .card-ovr { background: #f1c40f; color: #000; font-weight: bold; font-size: 11px; }
        .card-name { font-size: 9px; padding: 3px; }
        .bench-scroll-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .bench-card { flex: 0 0 70px; background: #1c2833; border: 2px solid #3498db; border-radius: 8px; text-align: center; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #0b0e14; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; }
        .active-nav { color: #3498db; }
    </style>
</head>
<body>
        <div id="top-bar">
        <div id="user-balance">💰 1000</div>
        <div id="squad-count">Jamoa: 5/15</div>
    </div>

    <div id="main-container">
        <div id="tab-team" class="tab-content active-tab">
            <div class="squad-pitch" id="formation-pitch"></div>
            <h3>ZAXIRA</h3>
            <div id="bench-scroll" class="bench-scroll-container"></div>
        </div>
        
        <div id="tab-play" class="tab-content">
            <div style="height:250px; background:#27ae60; border:2px solid white; position:relative;"></div>
            <p>O'yin maydoni</p>
        </div>
        
        <div id="tab-transfer" class="tab-content">
            <button onclick="buyPack()">Pack ochish (150💰)</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-nav" onclick="switchTab('tab-team', this)">Jamoam</div>
        <div class="nav-item" onclick="switchTab('tab-play', this)">O'ynash</div>
        <div class="nav-item" onclick="switchTab('tab-transfer', this)">Transfer</div>
    </div>
        <script>
        let balance = 1000;
        let mainSquad = [
            { name: "SHOMURODOV", ovr: 86, top: "15%", left: "50%" },
            { name: "FAYZULLAYEV", ovr: 85, top: "45%", left: "25%" },
            { name: "MASHARIPOV", ovr: 83, top: "45%", left: "75%" },
            { name: "ALIQULOV", ovr: 80, top: "70%", left: "50%" },
            { name: "YUSUPOV", ovr: 82, top: "85%", left: "50%" }
        ];
        let benchSquad = [];

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }

        function render() {
            const pitch = document.getElementById('formation-pitch');
            pitch.innerHTML = mainSquad.map(p => `
                <div class="pitch-card" style="top:${p.top}; left:${p.left};">
                    <div class="card-ovr">${p.ovr}</div>
                    <div class="card-name">${p.name}</div>
                </div>`).join('');
            
            document.getElementById('bench-scroll').innerHTML = benchSquad.map(p => `
                <div class="bench-card">
                    <div class="card-ovr">${p.ovr}</div>
                    <div class="card-name">${p.name}</div>
                </div>`).join('');
        }
        
        function buyPack() {
            if(balance >= 150) {
                balance -= 150;
                benchSquad.push({name: "YANGI", ovr: 75});
                render();
            }
        }
        render();
    </script>
</body>
</html>
