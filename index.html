<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Football</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #game-field { flex: 1; background: #2ecc71; position: relative; border-bottom: 5px solid #27ae60; }
        
        /* Boshqaruv qismi */
        #controls { height: 200px; display: flex; align-items: center; justify-content: space-around; padding: 10px; }
        #joystick { width: 100px; height: 100px; background: #34495e; border-radius: 50%; border: 4px solid #7f8c8d; }
        .action-btns { display: flex; gap: 10px; }
        button { padding: 20px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #btn-1 { background: #e74c3c; }
        #btn-2 { background: #f1c40f; }

        /* Navigatsiya paneli - siz to‘g‘rilagan stil */
        .nav-bar { background-color: #000000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
        .nav-icon { width: 28px; height: 28px; transition: 0.3s; filter: brightness(0) invert(1); opacity: 0.6; }
        .active-nav .nav-icon { opacity: 1; filter: brightness(0) saturate(100%) invert(48%) sepia(87%) saturate(1437%) hue-rotate(198deg) brightness(95%) contrast(85%); }
    </style>
</head>
<body>

    <div id="game-field">
        <!-- O‘yin maydoni -->
    </div>

    <div id="controls">
        <div id="joystick"></div>
        <div class="action-btns">
            <button id="btn-1">Pass</button>
            <button id="btn-2">Shoot</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-nav"><img src="500.jpg" class="nav-icon"></div>
        <div class="nav-item"><img src="503.png" class="nav-icon"></div>
        <div class="nav-item"><img src="502.jpg" class="nav-icon"></div>
    </div>

    <script>
        // O'yin holati
        let hasBall = true; // Hozircha o'yinchida to'p bor deb olamiz

        function updateControls() {
            const btn1 = document.getElementById('btn-1');
            const btn2 = document.getElementById('btn-2');

            if (hasBall) {
                btn1.innerText = "Pass";
                btn2.innerText = "Shoot";
            } else {
                btn1.innerText = "Press"; // Bosim o'tkazish
                btn2.innerText = "Tackle"; // To'pni olib qo'yish
            }
        }

        // Boshqaruvni yangilash
        updateControls();
        
        // Bu funksiyani o'yin logikasida to'p yo'qotilganda chaqirasiz:
        // hasBall = false; updateControls();
    </script>
</body>
</html>
