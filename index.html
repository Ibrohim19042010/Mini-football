<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Football Pro</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* 1. REALISTIK STADION */
        #game-field { 
            flex: 1; 
            /* Maysazor chiziqlari */
            background: repeating-linear-gradient(
                0deg,
                #27ae60,
                #27ae60 10%,
                #2ecc71 10%,
                #2ecc71 20%
            );
            position: relative; 
            border-bottom: 5px solid #1a252f;
        }
        /* Maydon markazidagi chiziq va aylana */
        #game-field::before {
            content: ""; position: absolute; top: 50%; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.7); transform: translateY(-50%);
        }
        #game-field::after {
            content: ""; position: absolute; top: 50%; left: 50%; width: 100px; height: 100px; 
            border: 3px solid rgba(255,255,255,0.7); border-radius: 50%; transform: translate(-50%, -50%);
        }

        /* 2. SHAFFOF BOSHQARUV PANELI */
        #controls { 
            height: 160px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 30px; 
            background: rgba(0, 0, 0, 0.4); /* Shaffof qora fon */
            backdrop-filter: blur(10px); /* Shisha effekti */
        }
        
        /* Shaffof Joystick */
        #joystick { 
            width: 100px; height: 100px; 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 50%; 
            border: 2px solid rgba(255, 255, 255, 0.2); 
            display: flex; align-items: center; justify-content: center;
        }
        #joystick-knob {
            width: 40px; height: 40px; background: rgba(255, 255, 255, 0.4); border-radius: 50%;
        }
        
        /* A va B tugmalari (Shaffof) */
        .action-btns { display: flex; gap: 15px; }
        .btn-game { 
            width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; 
            background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255,255,255,0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.1s ease; backdrop-filter: blur(5px);
        }
        .btn-game:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.3); }
        .btn-title { font-size: 26px; font-weight: bold; margin-bottom: 2px; }
        .btn-subtitle { font-size: 10px; opacity: 0.7; }

        /* 3. UYG'UNLASHGAN PASTKI MENU */
        .nav-bar { 
            background-color: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: #888; gap: 4px; }
        .nav-icon { 
            width: 26px; height: 26px; transition: 0.3s; 
            filter: invert(1) opacity(0.5); /* Ikonkalarni fon bilan uyg'unlashtirish */
        }
        
        /* Aktiv bo'lim dizayni */
        .active-nav { color: #3498db; }
        .active-nav .nav-icon { 
            filter: invert(45%) sepia(98%) saturate(1437%) hue-rotate(198deg) brightness(95%) contrast(85%); /* Ko'k rang */
            transform: scale(1.1); 
        }
    </style>
</head>
<body>

    <div id="game-field"></div>

    <div id="controls">
        <div id="joystick">
            <div id="joystick-knob"></div>
        </div>
        <div class="action-btns">
            <button id="btn-B" class="btn-game" onclick="actionBtn('B')">
                <span class="btn-title">B</span>
                <span class="btn-subtitle" id="label-B">Pass</span>
            </button>
            <button id="btn-A" class="btn-game" onclick="actionBtn('A')">
                <span class="btn-title">A</span>
                <span class="btn-subtitle" id="label-A">Shoot</span>
            </button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-nav">
            <img src="500.jpg" class="nav-icon">
            <span>Jamoam</span>
        </div>
        <div class="nav-item">
            <img src="503.png" class="nav-icon">
            <span>O'ynash</span>
        </div>
        <div class="nav-item">
            <img src="502.jpg" class="nav-icon">
            <span>Transfer</span>
        </div>
    </div>

    <script>
        // O'yin logikasi (To'p bizdami yoki yo'q)
        let hasBall = true;

        function updateButtons() {
            const labelA = document.getElementById('label-A');
            const labelB = document.getElementById('label-B');
            const btnA = document.getElementById('btn-A');
            const btnB = document.getElementById('btn-B');

            if (hasBall) {
                // Hujum holati
                labelA.innerText = "Shoot";
                labelB.innerText = "Pass";
                btnA.style.borderColor = "rgba(231, 76, 60, 0.6)"; // A tugma chekkasi qizilroq
                btnB.style.borderColor = "rgba(46, 204, 113, 0.6)"; // B tugma chekkasi yashilroq
            } else {
                // Himoya holati
                labelA.innerText = "Tackle";
                labelB.innerText = "Press";
                btnA.style.borderColor = "rgba(241, 196, 15, 0.6)"; // Sariqroq
                btnB.style.borderColor = "rgba(52, 152, 219, 0.6)"; // Ko'kroq
            }
        }

        // Tugma bosilganda ishlashi uchun
        function actionBtn(btnType) {
            let action = "";
            if (btnType === 'A') action = hasBall ? "Zarba berildi (Shoot)!" : "Olib qo'yildi (Tackle)!";
            if (btnType === 'B') action = hasBall ? "Pas berildi (Pass)!" : "Bosim (Press)!";
            
            console.log(action);
            
            // Vaqtinchalik: Har gal A bosilganda to'p holati o'zgaradi (Test uchun)
            if(btnType === 'A') {
                hasBall = !hasBall; 
                updateButtons();
            }
        }

        // Dastlabki holatni yuklash
        updateButtons();
    </script>
</body>
                </html>
