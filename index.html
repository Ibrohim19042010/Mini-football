<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Football Pro - Ultimate Manager</title>
    <style>
        body { margin: 0; background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: none; }

        /* ================= TOP BAR (BALANS VA LIMIT) ================= */
        #top-bar { height: 55px; background: #111622; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #1f293d; z-index: 101; }
        .balance-box { background: #172030; padding: 8px 15px; border-radius: 20px; font-weight: bold; color: #f1c40f; border: 1px solid #2c3e50; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .limit-box { background: #2c3e50; color: #fff; font-weight: bold; padding: 6px 12px; border-radius: 8px; font-size: 13px; border: 1px solid #34495e; }

        /* Barcha bo'limlar asosi */
        .tab-content { display: none; flex: 1; flex-direction: column; position: relative; height: calc(100vh - 115px); overflow-y: auto; }
        .active-tab { display: flex; }

        /* ================= 1. JAMOAM VA ZAXIRA BO'LIMI ================= */
        #tab-team { background: #141b26; padding: 15px; }
        .section-title { font-size: 16px; font-weight: bold; color: #3498db; margin: 15px 0 10px 0; border-left: 4px solid #3498db; padding-left: 8px; }
        
        .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 12px; padding-bottom: 10px; }
        
        /* Premium O'yinchi Kartochkasi */
        .player-card { 
            background: linear-gradient(135deg, #1e272e, #2c3e50); border: 2px solid #f1c40f; 
            border-radius: 8px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }
        .card-ovr { background: #f1c40f; color: #000; font-weight: bold; padding: 2px 0; font-size: 11px; }
        .card-img { height: 55px; background: #353b48; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-name { font-size: 9px; padding: 4px 2px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: #1a1f29; }
        .btn-sell { background: #e74c3c; color: white; border: none; font-size: 9px; padding: 3px 0; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-sell:active { background: #c0392b; }

        /* ================= 2. O'YNASH BO'LIMI (HIGH GRAFIKA & HUMAN MODELLAR) ================= */
        #game-field { flex: 1; background: repeating-linear-gradient(0deg, #219653, #219653 10%, #27ae60 10%, #27ae60 20%); position: relative; overflow: hidden; box-shadow: inset 0 0 40px rgba(0,0,0,0.3); }
        .center-line { position: absolute; top: 50%; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.4); transform: translateY(-50%); }
        .center-circle { position: absolute; top: 50%; left: 50%; width: 100px; height: 100px; border: 3px solid rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); }
        .goal { position: absolute; left: 50%; transform: translateX(-50%); width: 120px; height: 25px; border: 3px solid rgba(255,255,255,0.7); background: rgba(255,255,255,0.1); }
        .goal-top { top: 0; border-top: none; }
        .goal-bottom { bottom: 0; border-bottom: none; }

        /* REALISTIK INSON (HUMAN) MODELI CSS'DA */
        .human-player { 
            width: 30px; height: 45px; position: absolute; transform: translate(-50%, -50%); z-index: 5;
            display: flex; flex-direction: column; align-items: center;
        }
        .human-head { width: 14px; height: 14px; background: #ffdbac; border-radius: 50%; position: relative; box-shadow: inset -2px -2px 0 rgba(0,0,0,0.1); }
        .human-hair { width: 16px; height: 6px; background: #2c3e50; border-radius: 8px 8px 0 0; position: absolute; top: -2px; left: -1px; }
        .human-body { 
            width: 22px; height: 24px; background: linear-gradient(to bottom, #3498db, #2980b9); 
            border-radius: 5px 5px 2px 2px; margin-top: -1px; display: flex; align-items: center; justify-content: center;
            font-size: 8px; font-weight: bold; color: white; box-shadow: 0 3px 5px rgba(0,0,0,0.3);
        }
        /* Raqib jamoa formasi (Qizil insonlar) */
        .opp-human .human-body { background: linear-gradient(to bottom, #e74c3c, #c0392b); }
        .opp-human .human-hair { background: #111; }
        
        /* Harakatlanish/Yugurish animatsiyasi */
        .running { animation: humanRun 0.25s infinite alternate ease-in-out; }
        @keyframes humanRun {
            0% { transform: translate(-50%, -50%) rotate(5deg) scaleY(0.95); }
            100% { transform: translate(-50%, -50%) rotate(-5deg) scaleY(1.05); }
        }

        /* Boshqariladigan asosiy yulduz (Abbosbek) */
        #active-player { z-index: 10; }
        #active-player .human-body { background: linear-gradient(to bottom, #f1c40f, #f39c12); color: black; border: 1px solid #fff; }
        .player-glow { position: absolute; width: 34px; height: 12px; background: rgba(241, 196, 15, 0.4); border-radius: 50%; bottom: -6px; filter: blur(3px); animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(0.9); opacity: 0.6; } to { transform: scale(1.2); opacity: 1; } }

        /* REALISTIK TO'P */
        .ball { 
            width: 16px; height: 16px; position: absolute; transform: translate(-50%, -50%); z-index: 12;
            border-radius: 50%; background: #fff;
            background-image: radial-gradient(circle at 35% 35%, #ffffff 0%, #e0e0e0 50%, #888888 100%);
            box-shadow: 2px 5px 8px rgba(0,0,0,0.5); border: 1px solid #333; transition: all 0.1s linear;
        }
        .ball::before { content: "⚽"; position: absolute; top: -2px; left: -1px; font-size: 15px; }

        /* Boshqaruv paneli */
        #controls { height: 130px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; background: rgba(17, 22, 34, 0.9); backdrop-filter: blur(10px); border-top: 1px solid #1f293d; }
        #joystick-area { width: 95px; height: 95px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.2); position: relative; }
        #joystick-knob { width: 40px; height: 40px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 4px 8px rgba(0,0,0,0.4); pointer-events: none; }
        
        .action-btns { display: flex; gap: 15px; }
        .btn-game { width: 65px; height: 65px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; background: rgba(255, 255, 255, 0.08); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-game:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.2); }
        .btn-title { font-size: 22px; font-weight: bold; }

        /* ================= 3. TRANSFER (PACK OCHISH) ================= */
        #tab-transfer { background: #111622; padding: 20px; align-items: center; }
        .pack-container { display: flex; gap: 20px; margin-top: 40px; justify-content: center; width: 100%; }
        .pack-box { width: 130px; background: linear-gradient(145deg, #2c3e50, #1a252f); border: 2px solid #f1c40f; border-radius: 12px; padding: 20px 10px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.6); }
        .pack-box.mega { border-color: #e74c3c; background: linear-gradient(145deg, #34495e, #1e272e); }
        .pack-icon { font-size: 50px; margin-bottom: 15px; animation: float 2s infinite alternate; }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-8px); } }
        .pack-price { background: #f1c40f; color: black; font-weight: bold; padding: 6px 12px; border-radius: 15px; font-size: 13px; display: inline-block; margin-top: 15px; cursor: pointer; }

        /* MODAL ANIMATSIYA */
        #pack-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 200; align-items: center; justify-content: center; flex-direction: column; }
        .opened-cards { display: flex; gap: 15px; margin-top: 25px; }

        /* ================= PASTKI NAVIGATION MENU ================= */
        .nav-bar { height: 60px; background-color: #0b0e14; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1f293d; z-index: 101; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #7f8c8d; gap: 4px; cursor: pointer; width: 33%; }
        .nav-icon { width: 22px; height: 22px; filter: invert(1) opacity(0.4); }
        .active-nav { color: #3498db; font-weight: bold; }
        .active-nav .nav-icon { filter: invert(45%) sepia(98%) saturate(1437%) hue-rotate(198deg) brightness(95%) contrast(85%); }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <div id="top-bar">
        <div class="balance-box">Balans: <span id="user-balance">1000</span> 💰</div>
        <div class="limit-box">Jamoa: <span id="squad-count">5</span> / 15</div>
    </div>

    <!-- 1. JAMOAM BO'LIMI -->
    <div id="tab-team" class="tab-content active-tab">
        <div class="section-title">ASOSIY TARKIB (5 TA YULDUZ)</div>
        <div id="main-squad-grid" class="roster-grid">
            <!-- Asosiy o'yinchilar JS orqali joylashadi -->
        </div>
        
        <div class="section-title">ZAXIRA BO'LIMI (MAX 10 TA)</div>
        <div id="bench-squad-grid" class="roster-grid">
            <!-- Packdan chiqqanlar shu yerga tushadi -->
        </div>
    </div>

    <!-- 2. O'YNASH BO'LIMI -->
    <div id="tab-play" class="tab-content">
        <div id="game-field">
            <div class="center-line"></div>
            <div class="center-circle"></div>
            <div class="goal goal-top"></div>
            <div class="goal goal-bottom"></div>
            
            <!-- Realistik To'p -->
            <div class="ball" id="match-ball"></div>

            <!-- Bizning 3D Insonlar (Ko'k) -->
            <div class="human-player" style="top: 85%; left: 50%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">GK</div></div>
            <div class="human-player" style="top: 72%; left: 28%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">DF</div></div>
            <div class="human-player" style="top: 72%; left: 72%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">DF</div></div>
            <div class="human-player" style="top: 56%; left: 25%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">MD</div></div>
            
            <!-- BOSHQRILADIGAN ASOSIY INSON (Abbosbek) -->
            <div class="human-player" id="active-player" style="top: 56%; left: 50%;">
                <div class="human-head"><div class="human-hair" style="background:#d35400;"></div></div>
                <div class="human-body">10</div>
                <div class="player-glow"></div>
            </div>

            <!-- Raqib Insonlar (Qizil) -->
            <div class="human-player opp-human" style="top: 15%; left: 50%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">GK</div></div>
            <div class="human-player opp-human" style="top: 30%; left: 30%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">DF</div></div>
            <div class="human-player opp-human" style="top: 30%; left: 70%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">DF</div></div>
            <div class="human-player opp-human" style="top: 44%; left: 40%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">MD</div></div>
            <div class="human-player opp-human" style="top: 44%; left: 60%;"><div class="human-head"><div class="human-hair"></div></div><div class="human-body">FW</div></div>
        </div>

        <!-- Boshqaruv paneli -->
        <div id="controls">
            <div id="joystick-area"><div id="joystick-knob"></div></div>
            <div class="action-btns">
                <button class="btn-game" onclick="shootBall()"><span class="btn-title">A</span><span style="font-size:9px;">Zarba</span></button>
                <button class="btn-game" onclick="passBall()"><span class="btn-title">B</span><span style="font-size:9px;">Pass</span></button>
            </div>
        </div>
    </div>

    <!-- 3. TRANSFER BO'LIMI -->
    <div id="tab-transfer" class="tab-content">
        <div class="section-title" style="text-align: center; font-size: 18px;">OMADLI PACK OCHISH BOZORI</div>
        <div class="pack-container">
            <div class="pack-box">
                <div class="pack-icon">📦</div>
                <div style="font-weight:bold;">1X STANDART</div>
                <div class="pack-price" onclick="buyPack(1, 150)">150 💰</div>
            </div>
            <div class="pack-box mega">
                <div class="pack-icon">🔥</div>
                <div style="font-weight:bold; color:#e74c3c;">3X PREMIUM</div>
                <div class="pack-price" style="background:#e74c3c; color:white;" onclick="buyPack(3, 400)">400 💰</div>
            </div>
        </div>
    </div>

    <!-- PACK ANIMATSIYA MODAL -->
    <div id="pack-modal">
        <h2 style="color: #f1c40f; margin: 0; letter-spacing: 2px; text-shadow: 0 0 10px #f1c40f;">YANGI SHARTNOMA!</h2>
        <div class="opened-cards" id="modal-cards-container"></div>
        <button style="background:#3498db; color:white; border:none; padding:12px 35px; border-radius:25px; font-weight:bold; margin-top:40px; font-size:14px; box-shadow:0 4px 15px rgba(52,152,219,0.4);" onclick="closePackModal()">Klubga qo'shish</button>
    </div>

    <!-- PASTKI MENU -->
    <div class="nav-bar">
        <div class="nav-item active-nav" onclick="switchTab('tab-team', this)"><img src="500.jpg" class="nav-icon" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0iI2ZmZiI+PHBhdGggZD0iTTEyIDEyYzIuMjEgMCA0LTEuNzkgNC00czEuNzktNCA0LTRtMCA2Yy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2djItYzAtMi42Ni01LjMzLTQtOCA0eiIvPjwvc3ZnPg=='"><span>Jamoam</span></div>
        <div class="nav-item" onclick="switchTab('tab-play', this)"><img src="503.png" class="nav-icon" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0iI2ZmZiI+PHBhdGggZD0iTTEyIDJDMiAyIDIuNSAzIDIuNSAzcy0uNS41LTEuNS41UzAgMi41IDAgMi41em0wIDE4YzUuNTIgMCAxMC00LjQ4IDEwLTEwUzE3LjUyIDIgMTIgMiAyIDYuNDggMiAxMnM0LjQ4IDEwIDEwIDEweiIvPjwvc3ZnPg=='"><span>O'ynash</span></div>
        <div class="nav-item" onclick="switchTab('tab-transfer', this)"><img src="502.jpg" class="nav-icon" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0iI2ZmZiI+PHBhdGggZD0iTTE1IDNINnYxOGg5bTQtM2wtNC00bTQgNGwtNCBtbS00LTR2OGg4di04SDExeiIvPjwvc3ZnPg=='"><span>Transfer</span></div>
    </div>

    <script>
        let balance = 1000;
        
        // Asosiy boshlang'ich tarkib
        let mainSquad = [
            { name: "SHOMURODOV", ovr: 86, img: "eldor.jpg" },
            { name: "FAYZULLAYEV", ovr: 85, img: "abbos.jpg" },
            { name: "MASHARIPOV", ovr: 83, img: "masharipov.jpg" },
            { name: "ALIQULOV", ovr: 80, img: "aliqulov.jpg" },
            { name: "YUSUPOV", ovr: 82, img: "yusupov.jpg" }
        ];

        // Zaxira tarkibi (Boshida bo'sh bo'ladi, packdan qo'shiladi)
        let benchSquad = [];

        // Pack ochganda chiqishi mumkin bo'lgan o'yinchilar bazasi
        const playerPool = [
            { name: "URUNOV", ovr: 81, img: "urunov.jpg", price: 60 },
            { name: "SHUKUROV", ovr: 82, img: "shukurov.jpg", price: 70 },
            { name: "KHUSANOV", ovr: 84, img: "khusanov.jpg", price: 90 },
            { name: "ERKINV", ovr: 79, img: "erkinov.jpg", price: 50 },
            { name: "SERGEEV", ovr: 78, img: "sergeev.jpg", price: 45 },
            { name: "SAYFIEV", ovr: 77, img: "sayfiev.jpg", price: 40 }
        ];

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active-tab');
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active-nav'));
            element.classList.add('active-nav');
        }

        // --- DINAMIK JAMOANI RENDER QILISH TIZIMI ---
        function renderSquads() {
            // 1. Asosiy Tarkib
            const mainGrid = document.getElementById('main-squad-grid');
            mainGrid.innerHTML = "";
            mainSquad.forEach(p => {
                mainGrid.innerHTML += `
                    <div class="player-card">
                        <div class="card-ovr">${p.ovr}</div>
                        <div class="card-img"><img src="${p.img}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSIjN2Y4YzhkIj48cGF0aCBkPSJNMTIgMTJjMi4yMSAwIDQtMS43OSA0LT00czEuNzktNCA0LTRtMCA2Yy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2djItYzAtMi42Ni01LjMzLTQtOCA0eiIvPjwvc3ZnPg=='"></div>
                        <div class="card-name">${p.name}</div>
                    </div>`;
            });

            // 2. Zaxira Tarkib
            const benchGrid = document.getElementById('bench-squad-grid');
            benchGrid.innerHTML = "";
            benchSquad.forEach((p, index) => {
                benchGrid.innerHTML += `
                    <div class="player-card" style="border-color: #3498db;">
                        <div class="card-ovr" style="background:#3498db; color:white;">${p.ovr}</div>
                        <div class="card-img"><img src="${p.img}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSIjN2Y4YzhkIj48cGF0aCBkPSJNMTIgMTJjMi4yMSAwIDQtMS43OSA0LT00czEuNzktNCA0LTRtMCA2Yy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2djItYzAtMi42Ni01LjMzLTQtOCA0eiIvPjwvc3ZnPg=='"></div>
                        <div class="card-name">${p.name}</div>
                        <button class="btn-sell" onclick="sellPlayer(${index})">${p.price} 💰 Sotish</button>
                    </div>`;
            });

            // Hisoblagichlarni yangilash
            let totalPlayers = mainSquad.length + benchSquad.length;
            document.getElementById('squad-count').innerText = totalPlayers;
            document.getElementById('user-balance').innerText = balance;
        }

        // --- PACK OCHISH LOGIKASI ---
        function buyPack(count, cost) {
            let totalCurrent = mainSquad.length + benchSquad.length;
            if (totalCurrent + count > 15) {
                alert("Klubda joy qolmadi! Maksimal o'yinchilar soni 15 ta. Ortiqchasini sotib yuboring!");
                return;
            }
            if (balance < cost) {
                alert("Mablag' yetarli emas! Katta futbol osonlikcha qurilmaydi! 💰");
                return;
            }

            balance -= cost;
            const modalContainer = document.getElementById('modal-cards-container');
            modalContainer.innerHTML = "";

            for (let i = 0; i < count; i++) {
                let randomPlayer = {...playerPool[Math.floor(Math.random() * playerPool.length)]};
                benchSquad.push(randomPlayer); // Avtomatik zaxiraga qo'shish

                modalContainer.innerHTML += `
                    <div class="player-card" style="position:relative; transform:none;">
                        <div class="card-ovr">${randomPlayer.ovr}</div>
                        <div class="card-img"><img src="${randomPlayer.img}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSIjN2Y4YzhkIj48cGF0aCBkPSJNMTIgMTJjMi4yMSAwIDQtMS43OSA0LT00czEuNzktNCA0LTRtMCA2Yy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2djItYzAtMi42Ni01LjMzLTQtOCA0eiIvPjwvc3ZnPg=='"></div>
                        <div class="card-name">${randomPlayer.name}</div>
                    </div>`;
            }

            document.getElementById('pack-modal').style.display = 'flex';
            renderSquads();
        }

        function closePackModal() {
            document.getElementById('pack-modal').style.display = 'none';
        }

        // --- O'YINCHINI SOTISH ---
        function sellPlayer(index) {
            let soldPlayer = benchSquad[index];
            balance += soldPlayer.price;
            benchSquad.splice(index, 1); // Ro'yxatdan o'chirish
            renderSquads();
        }

        // --- 3D JOYSTICK VA HARAKATLANISH MATIQI ---
        const joyArea = document.getElementById('joystick-area');
        const joyKnob = document.getElementById('joystick-knob');
        const activePlayer = document.getElementById('active-player');
        const matchBall = document.getElementById('match-ball');
        
        let isDragging = false;
        let joyCenterX, joyCenterY;
        let playerX = 50, playerY = 56;
        let ballX = 50, ballY = 52;
        let hasBall = true;

        joyArea.addEventListener('touchstart', (e) => {
            isDragging = true;
            const rect = joyArea.getBoundingClientRect();
            joyCenterX = rect.left + rect.width / 2;
            joyCenterY = rect.top + rect.height / 2;
            activePlayer.classList.add('running'); // Inson tebranish animatsiyasi yoqiladi
        });

        joyArea.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();

            let dx = e.touches[0].clientX - joyCenterX;
            let dy = e.touches[0].clientY - joyCenterY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > 30) { dx = (dx/dist)*30; dy = (dy/dist)*30; }
            joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

            // Tezlik koeffitsiyenti
            playerX += dx * 0.05; playerY += dy * 0.05;
            playerX = Math.max(5, Math.min(95, playerX));
            playerY = Math.max(5, Math.min(95, playerY));

            activePlayer.style.left = playerX + "%";
            activePlayer.style.top = playerY + "%";
            
            if(hasBall) {
                ballX = playerX;
                ballY = playerY - 3; // To'p insonning oyog'i oldida yuradi
                matchBall.style.left = ballX + "%";
                matchBall.style.top = ballY + "%";
            }
        });

        joyArea.addEventListener('touchend', () => {
            isDragging = false;
            joyKnob.style.transform = `translate(-50%, -50%)`;
            activePlayer.classList.remove('running'); // Animatsiya o'chadi
        });

        // TUGMALAR FUNKSIYASI
        function shootBall() {
            if(!hasBall) return;
            hasBall = false;
            // To'pni yuqori darvozaga qarab uchish effekti
            matchBall.style.top = "3%";
            matchBall.style.left = "50%";
            setTimeout(() => {
                alert("GOOOOAL! ⚽🇺🇿");
                resetBall();
            }, 800);
        }

        function passBall() {
            if(!hasBall) return;
            hasBall = false;
            // To'pni boshqa o'yinchiga uzatish
            matchBall.style.left = "25%";
            matchBall.style.top = "56%";
            setTimeout(() => { resetBall(); }, 1200);
        }

        function resetBall() {
            hasBall = true;
            playerX = 50; playerY = 56;
            activePlayer.style.left = "50%"; activePlayer.style.top = "56%";
            matchBall.style.left = "50%"; matchBall.style.top = "53%";
        }

        // Boshlanishida jamoani chizish
        renderSquads();
    </script>
</body>
</html>
