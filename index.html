<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Football Pro</title>
    <style>
        body { margin: 0; background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: none; }

        /* ================= TOP BAR (BALANS) ================= */
        #top-bar { height: 50px; background: #111622; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #1f293d; z-index: 101; }
        .balance-box { background: #172030; padding: 6px 15px; border-radius: 20px; font-weight: bold; color: #f1c40f; border: 1px solid #2c3e50; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .ovr-box { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #000; font-weight: bold; padding: 5px 12px; border-radius: 6px; font-size: 13px; border: 1px solid #d35400; }

        /* Barcha bo'limlar asosi */
        .tab-content { display: none; flex: 1; flex-direction: column; position: relative; height: calc(100vh - 110px); overflow-y: auto; }
        .active-tab { display: flex; }

        /* ================= 1. JAMOAM BO'LIMI ================= */
        #tab-team { background: repeating-linear-gradient(0deg, #27ae60, #27ae60 8%, #2ecc71 8%, #2ecc71 16%); position: relative; }
        .player-card { 
            position: absolute; width: 68px; background: linear-gradient(135deg, #1e272e, #2f3640); border: 2px solid #f1c40f; 
            border-radius: 8px; text-align: center; box-shadow: 0 6px 12px rgba(0,0,0,0.6); 
            display: flex; flex-direction: column; overflow: hidden; transform: translate(-50%, -50%);
        }
        .card-ovr { background: #f1c40f; color: #000; font-weight: bold; padding: 2px 0; font-size: 12px; }
        .card-img { height: 45px; background: #353b48; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-name { font-size: 9px; padding: 3px 2px; font-weight: bold; white-space: nowrap; background: #1e272e; }

        /* Pozitsiyalar */
        #pos-gk { top: 85%; left: 50%; }
        #pos-def { top: 65%; left: 50%; }
        #pos-mid1 { top: 45%; left: 25%; }
        #pos-mid2 { top: 45%; left: 75%; }
        #pos-fwd { top: 25%; left: 50%; }

        /* ================= 2. O'YNASH BO'LIMI (3D) ================= */
        #game-field { flex: 1; background: repeating-linear-gradient(0deg, #219653, #219653 10%, #27ae60 10%, #27ae60 20%); position: relative; overflow: hidden; }
        .center-line { position: absolute; top: 50%; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.5); transform: translateY(-50%); }
        .center-circle { position: absolute; top: 50%; left: 50%; width: 90px; height: 90px; border: 3px solid rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
        .goal { position: absolute; left: 50%; transform: translateX(-50%); width: 110px; height: 25px; border: 3px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.1); }
        .goal-top { top: 0; border-top: none; }
        .goal-bottom { bottom: 0; border-bottom: none; }

        /* REALISTIK 3D O'YINCHILAR */
        .player-3d { 
            width: 24px; height: 32px; position: absolute; transform: translate(-50%, -50%); z-index: 5;
            background: linear-gradient(to bottom, #3498db 70%, #2980b9 100%);
            border-radius: 12px 12px 6px 6px;
            box-shadow: 0 5px 0 #1c5980, 0 8px 10px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            font-size: 8px; font-weight: bold; color: white; padding-top: 4px;
        }
        .opp-3d { 
            background: linear-gradient(to bottom, #e74c3c 70%, #c0392b 100%); 
            box-shadow: 0 5px 0 #8e2a1e, 0 8px 10px rgba(0,0,0,0.5); 
        }
        
        /* Harakatlanish/Yugurish animatsiyasi */
        .running { animation: runAnim 0.3s infinite alternate ease-in-out; }
        @keyframes runAnim {
            0% { transform: translate(-50%, -50%) scaleY(1) rotate(3deg); }
            100% { transform: translate(-50%, -50%) scaleY(0.95) rotate(-3deg); }
        }

        #active-player { border: 2px solid #f1c40f; box-shadow: 0 5px 0 #1c5980, 0 0 15px #f1c40f; }

        /* REALISTIK TO'P */
        .ball { 
            width: 16px; height: 16px; position: absolute; transform: translate(-50%, -50%); z-index: 10;
            border-radius: 50%; background: #fff;
            background-image: radial-gradient(circle at 30% 30%, #ffffff 0%, #e0e0e0 60%, #999999 100%);
            box-shadow: 2px 6px 8px rgba(0,0,0,0.6);
            border: 1px solid #000;
        }
        /* To'p aylanayotgandek chiziqlar */
        .ball::before { content: "⚽"; position: absolute; top: -2px; left: -1px; font-size: 15px; line-height: 16px; }

        /* Boshqaruv paneli */
        #controls { height: 140px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; background: rgba(17, 22, 34, 0.85); backdrop-filter: blur(10px); border-top: 1px solid #1f293d; }
        #joystick-area { width: 100px; height: 100px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.2); position: relative; }
        #joystick-knob { width: 42px; height: 42px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 4px 8px rgba(0,0,0,0.4); pointer-events: none; }
        
        .action-btns { display: flex; gap: 15px; }
        .btn-game { width: 65px; height: 65px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; background: rgba(255, 255, 255, 0.08); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .btn-game:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.2); }
        .btn-title { font-size: 24px; font-weight: bold; }
        .btn-subtitle { font-size: 9px; opacity: 0.8; }

        /* ================= 3. TRANSFER (PACK OCHISH) ================= */
        #tab-transfer { background: #111622; padding: 20px; align-items: center; }
        .pack-container { display: flex; gap: 20px; margin-top: 30px; justify-content: center; width: 100%; }
        .pack-card { width: 130px; background: linear-gradient(145deg, #1e272e, #2c3e50); border: 2px solid #cd7f32; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.5); transition: 0.2s; }
        .pack-card.gold { border-color: #f1c40f; background: linear-gradient(145deg, #2c3e50, #1a252f); }
        .pack-card:active { transform: scale(0.95); }
        .pack-icon { font-size: 45px; margin-bottom: 10px; animation: float 2s infinite alternate; }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-6px); } }
        .pack-title { font-weight: bold; font-size: 14px; margin-bottom: 8px; }
        .pack-price { background: #f1c40f; color: black; font-weight: bold; padding: 5px 10px; border-radius: 15px; font-size: 12px; display: inline-block; margin-top: 10px; }

        /* PACK ANIMATSIYASI MODAL */
        #pack-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; flex-direction: column; }
        .opened-players { display: flex; gap: 15px; margin-top: 20px; min-height: 130px; }
        .modal-btn { background: #3498db; color: white; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; margin-top: 30px; cursor: pointer; }

        /* ================= PASTKI MENU ================= */
        .nav-bar { height: 60px; background-color: #0b0e14; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1f293d; z-index: 101; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #7f8c8d; gap: 4px; cursor: pointer; width: 33%; }
        .nav-icon { width: 22px; height: 22px; transition: 0.3s; filter: invert(1) opacity(0.4); }
        .active-nav { color: #3498db; font-weight: bold; }
        .active-nav .nav-icon { filter: invert(45%) sepia(98%) saturate(1437%) hue-rotate(198deg) brightness(95%) contrast(85%); transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="balance-box">Balans: <span id="user-balance">1000</span> 💰</div>
        <div class="ovr-box">OVR: <span id="team-ovr">83</span></div>
    </div>

    <div id="tab-team" class="tab-content active-tab">
        <div class="player-card" id="pos-fwd"><div class="card-ovr">86</div><div class="card-img"><img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Eldor"></div><div class="card-name">SHOMURODOV</div></div>
        <div class="player-card" id="pos-mid1"><div class="card-ovr">85</div><div class="card-img"><img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Abbos"></div><div class="card-name">FAYZULLAYEV</div></div>
        <div class="player-card" id="pos-mid2"><div class="card-ovr">83</div><div class="card-img"><img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Jalol"></div><div class="card-name">MASHARIPOV</div></div>
        <div class="player-card" id="pos-def"><div class="card-ovr">80</div><div class="card-img"><img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Husniddin"></div><div class="card-name">ALIQULOV</div></div>
        <div class="player-card" id="pos-gk"><div class="card-ovr">82</div><div class="card-img"><img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Utkir"></div><div class="card-name">YUSUPOV</div></div>
    </div>

    <div id="tab-play" class="tab-content">
        <div id="game-field">
            <div class="center-line"></div>
            <div class="center-circle"></div>
            <div class="goal goal-top"></div>
            <div class="goal goal-bottom"></div>
            
            <div class="ball" id="match-ball"></div>

            <div class="player-3d" style="top: 85%; left: 50%;">GK</div>
            <div class="player-3d" style="top: 70%; left: 30%;">DF</div>
            <div class="player-3d" style="top: 70%; left: 70%;">DF</div>
            <div class="player-3d" style="top: 55%; left: 20%;">MD</div>
            
            <div class="player-3d" id="active-player" style="top: 55%; left: 50%;">MD</div>

            <div class="player-3d opp-3d" style="top: 15%; left: 50%;">GK</div>
            <div class="player-3d opp-3d" style="top: 32%; left: 33%;">DF</div>
            <div class="player-3d opp-3d" style="top: 32%; left: 66%;">DF</div>
            <div class="player-3d opp-3d" style="top: 45%; left: 40%;">MD</div>
            <div class="player-3d opp-3d" style="top: 45%; left: 60%;">FW</div>
        </div>

        <div id="controls">
            <div id="joystick-area"><div id="joystick-knob"></div></div>
            <div class="action-btns">
                <button id="btn-B" class="btn-game" onclick="actionBtn('B')"><span class="btn-title">B</span><span class="btn-subtitle" id="label-B">Pass</span></button>
                <button id="btn-A" class="btn-game" onclick="actionBtn('A')"><span class="btn-title">A</span><span class="btn-subtitle" id="label-A">Shoot</span></button>
            </div>
        </div>
    </div>

    <div id="tab-transfer" class="tab-content">
        <h3 style="margin: 10px 0 0 0;">TRANSFER DO'KONI</h3>
        <div class="pack-container">
            <div class="pack-card" onclick="openPack(1, 150)">
                <div class="pack-icon">📦</div>
                <div class="pack-title">1x O'yinchi</div>
                <div class="pack-price">150 💰</div>
            </div>
            <div class="pack-card gold" onclick="openPack(3, 400)">
                <div class="pack-icon">🔥</div>
                <div class="pack-title">3x O'yinchi (Gold)</div>
                <div class="pack-price">400 💰</div>
            </div>
        </div>
    </div>

    <div id="pack-modal">
        <h2 style="color: #f1c40f; margin: 0;">PACK OCHILMOQDA...</h2>
        <div class="opened-players" id="opened-container"></div>
        <button class="modal-btn" onclick="closeModal()">Yopish</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-nav" onclick="switchTab('tab-team', this)"><img src="500.jpg" class="nav-icon" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0iI2ZmZiI+PHBhdGggZD0iTTEyIDEyYzIuMjEgMCA0LTEuNzkgNC00czEuNzktNCA0LTRtMCA2Yy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2djItYzAtMi42Ni01LjMzLTQtOCA0eiIvPjwvc3ZnPg=='"><span>Jamoam</span></div>
        <div class="nav-item" onclick="switchTab('tab-play', this)"><img src="503.png" class="nav-icon" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0iI2ZmZiI+PHBhdGggZD0iTTEyIDJDMiAyIDIuNSAzIDIuNSAzcy0uNS41LTEuNS41UzAgMi41IDAgMi41em0wIDE4YzUuNTIgMCAxMC00LjQ4IDEwLTEwUzE3LjUyIDIgMTIgMiAyIDYuNDggMiAxMnM0LjQ4IDEwIDEwIDEweiIvPjwvc3ZnPg=='"><span>O'ynash</span></div>
        <div class="nav-item" onclick="switchTab('tab-transfer', this)"><img src="502.jpg" class="nav-icon" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0iI2ZmZiI+PHBhdGggZD0iTTE1IDNINnYxOGg5bTQtM2wtNC00bTQgNGwtNCBtbS00LTR2OGg4di04SDExeiIvPjwvc3ZnPg=='"><span>Transfer</span></div>
    </div>

    <script>
        let balance = 1000;
        const pool = [
            {name: "URUNOV", ovr: 81, seed: "Oston"},
            {name: "SERGEEV", ovr: 78, seed: "Igor"},
            {name: "ERKINV", ovr: 79, seed: "Hojimat"},
            {name: "SAYFIEV", ovr: 77, seed: "Farrux"},
            {name: "SHUKURV", ovr: 82, seed: "Otabek"}
        ];

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active-tab');
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active-nav'));
            element.classList.add('active-nav');
        }

        // --- PACK OCHISH LOGIKASI ---
        function openPack(count, price) {
            if (balance < price) {
                alert("Mablag' yetarli emas! 💰");
                return;
            }
            balance -= price;
            document.getElementById('user-balance').innerText = balance;

            const container = document.getElementById('opened-container');
            container.innerHTML = "";
            document.getElementById('pack-modal').style.display = 'flex';

            for(let i=0; i<count; i++) {
                let p = pool[Math.floor(Math.random() * pool.length)];
                container.innerHTML += `
                    <div class="player-card" style="position:relative; transform:none; top:0; left:0;">
                        <div class="card-ovr">${p.ovr}</div>
                        <div class="card-img"><img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${p.seed}"></div>
                        <div class="card-name">${p.name}</div>
                    </div>`;
            }
        }
        function closeModal() { document.getElementById('pack-modal').style.display = 'none'; }

        // --- O'YIN VA JOYSTICK LOGIKASI ---
        let hasBall = true;
        function updateButtons() {
            document.getElementById('label-A').innerText = hasBall ? "Shoot" : "Tackle";
            document.getElementById('label-B').innerText = hasBall ? "Pass" : "Press";
        }
        function actionBtn(btnType) {
            hasBall = !hasBall; updateButtons();
            const ball = document.getElementById('match-ball');
            if(btnType === 'A') ball.style.top = '5%';
            setTimeout(() => ball.style.top = '50%', 1000);
        }

        const joyArea = document.getElementById('joystick-area');
        const joyKnob = document.getElementById('joystick-knob');
        const activePlayer = document.getElementById('active-player');
        
        let isDragging = false;
        let joyCenterX, joyCenterY;
        let playerX = 50, playerY = 55;

        joyArea.addEventListener('touchstart', (e) => {
            isDragging = true;
            const rect = joyArea.getBoundingClientRect();
            joyCenterX = rect.left + rect.width / 2;
            joyCenterY = rect.top + rect.height / 2;
            activePlayer.classList.add('running'); // Yugurish animatsiyasi yoqiladi
        });

        joyArea.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            let dx = e.touches[0].clientX - joyCenterX;
            let dy = e.touches[0].clientY - joyCenterY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > 30) { dx = (dx/dist)*30; dy = (dy/dist)*30; }
            joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

            playerX += dx * 0.06; playerY += dy * 0.06;
            playerX = Math.max(5, Math.min(95, playerX));
            playerY = Math.max(5, Math.min(95, playerY));

            activePlayer.style.left = playerX + "%";
            activePlayer.style.top = playerY + "%";
            
            if(hasBall) {
                const ball = document.getElementById('match-ball');
                ball.style.left = playerX + "%";
                ball.style.top = (playerY - 3) + "%";
            }
        });

        joyArea.addEventListener('touchend', () => {
            isDragging = false;
            joyKnob.style.transform = `translate(-50%, -50%)`;
            activePlayer.classList.remove('running'); // Animatsiya to'xtaydi
        });
        
        updateButtons();
    </script>
</body>
                                                                               </html>
