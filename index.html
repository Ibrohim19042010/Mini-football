<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Football Pro</title>
    <style>
        body { margin: 0; background: #0e1217; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: none; }

        /* Barcha bo'limlar asosi */
        .tab-content { display: none; flex: 1; flex-direction: column; position: relative; height: calc(100vh - 60px); }
        .active-tab { display: flex; }

        /* ================= 1. JAMOAM BO'LIMI ================= */
        #tab-team { background: repeating-linear-gradient(0deg, #27ae60, #27ae60 10%, #2ecc71 10%, #2ecc71 20%); }
        .team-title { text-align: center; padding: 15px; background: rgba(0,0,0,0.6); font-weight: bold; font-size: 18px; letter-spacing: 1px; border-bottom: 2px solid #3498db; }
        
        /* O'yinchi kartochkalari */
        .player-card { 
            position: absolute; width: 65px; background: #1a252f; border: 2px solid #f1c40f; 
            border-radius: 6px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
            display: flex; flex-direction: column; overflow: hidden; transform: translate(-50%, -50%);
        }
        .card-ovr { background: #2c3e50; color: #f1c40f; font-weight: bold; padding: 3px 0; font-size: 14px; border-bottom: 1px solid #34495e; }
        .card-name { font-size: 10px; padding: 4px 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-img { font-size: 20px; background: #34495e; padding: 2px 0; }

        /* Jamoa joylashuvi (5 kishi) */
        #pos-gk { top: 85%; left: 50%; }
        #pos-def { top: 65%; left: 50%; }
        #pos-mid1 { top: 45%; left: 25%; }
        #pos-mid2 { top: 45%; left: 75%; }
        #pos-fwd { top: 25%; left: 50%; }

        /* ================= 2. O'YNASH BO'LIMI ================= */
        #game-field { flex: 1; background: repeating-linear-gradient(0deg, #27ae60, #27ae60 10%, #2ecc71 10%, #2ecc71 20%); position: relative; overflow: hidden; }
        
        /* Chiziqlar va Darvozalar */
        .center-line { position: absolute; top: 50%; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.6); transform: translateY(-50%); }
        .center-circle { position: absolute; top: 50%; left: 50%; width: 90px; height: 90px; border: 3px solid rgba(255,255,255,0.6); border-radius: 50%; transform: translate(-50%, -50%); }
        .goal { position: absolute; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; border: 3px solid rgba(255,255,255,0.8); }
        .goal-top { top: 0; border-top: none; }
        .goal-bottom { bottom: 0; border-bottom: none; }

        /* O'yinchilar va to'p */
        .player-dot { width: 24px; height: 24px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .team-uzb { background: #3498db; color: white; } /* Ko'k - biz */
        .team-opp { background: #e74c3c; color: white; } /* Qizil - raqib */
        .ball { width: 14px; height: 14px; background: white; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); border: 1px solid #333; box-shadow: 1px 1px 3px rgba(0,0,0,0.5); left: 50%; top: 50%; z-index: 10; }
        
        /* Asosiy boshqariladigan o'yinchi belgisi */
        #active-player { border: 2px solid #f1c40f; z-index: 5; box-shadow: 0 0 10px #f1c40f; }

        /* Boshqaruv paneli */
        #controls { height: 160px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); }
        #joystick-area { width: 110px; height: 110px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.3); position: relative; }
        #joystick-knob { width: 46px; height: 46px; background: rgba(255, 255, 255, 0.5); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 2px 5px rgba(0,0,0,0.5); pointer-events: none; }
        
        .action-btns { display: flex; gap: 15px; }
        .btn-game { width: 70px; height: 70px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; background: rgba(255, 255, 255, 0.1); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .btn-game:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.3); }
        .btn-title { font-size: 26px; font-weight: bold; }
        .btn-subtitle { font-size: 10px; opacity: 0.8; }

        /* ================= PASTKI MENU ================= */
        .nav-bar { height: 60px; background-color: #111; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: #888; gap: 4px; cursor: pointer; width: 33%; }
        .nav-icon { width: 24px; height: 24px; transition: 0.3s; filter: invert(1) opacity(0.5); }
        .active-nav { color: #3498db; font-weight: bold; }
        .active-nav .nav-icon { filter: invert(45%) sepia(98%) saturate(1437%) hue-rotate(198deg) brightness(95%) contrast(85%); transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="tab-team" class="tab-content active-tab">
        <div class="team-title">🇺🇿 UZBEKISTAN NATIONAL TEAM</div>
        <div class="player-card" id="pos-fwd"><div class="card-ovr">86</div><div class="card-img">🏃</div><div class="card-name">SHOMURODOV</div></div>
        <div class="player-card" id="pos-mid1"><div class="card-ovr">85</div><div class="card-img">⚡</div><div class="card-name">FAYZULLAYEV</div></div>
        <div class="player-card" id="pos-mid2"><div class="card-ovr">83</div><div class="card-img">🎯</div><div class="card-name">MASHARIPOV</div></div>
        <div class="player-card" id="pos-def"><div class="card-ovr">80</div><div class="card-img">🧱</div><div class="card-name">ALIQULOV</div></div>
        <div class="player-card" id="pos-gk"><div class="card-ovr">82</div><div class="card-img">🧤</div><div class="card-name">YUSUPOV</div></div>
    </div>

    <div id="tab-play" class="tab-content">
        <div id="game-field">
            <div class="center-line"></div>
            <div class="center-circle"></div>
            <div class="goal goal-top"></div>
            <div class="goal goal-bottom"></div>
            
            <div class="ball" id="match-ball"></div>

            <div class="player-dot team-uzb" style="top: 85%; left: 50%;">GK</div>
            <div class="player-dot team-uzb" style="top: 70%; left: 30%;">DF</div>
            <div class="player-dot team-uzb" style="top: 70%; left: 70%;">DF</div>
            <div class="player-dot team-uzb" style="top: 55%; left: 20%;">MD</div>
            
            <div class="player-dot team-uzb" id="active-player" style="top: 55%; left: 50%;">MD</div>

            <div class="player-dot team-opp" style="top: 15%; left: 50%;">GK</div>
            <div class="player-dot team-opp" style="top: 30%; left: 30%;">DF</div>
            <div class="player-dot team-opp" style="top: 30%; left: 70%;">DF</div>
            <div class="player-dot team-opp" style="top: 45%; left: 40%;">MD</div>
            <div class="player-dot team-opp" style="top: 45%; left: 60%;">FW</div>
        </div>

        <div id="controls">
            <div id="joystick-area">
                <div id="joystick-knob"></div>
            </div>
            <div class="action-btns">
                <button id="btn-B" class="btn-game" onclick="actionBtn('B')">
                    <span class="btn-title">B</span><span class="btn-subtitle" id="label-B">Pass</span>
                </button>
                <button id="btn-A" class="btn-game" onclick="actionBtn('A')">
                    <span class="btn-title">A</span><span class="btn-subtitle" id="label-A">Shoot</span>
                </button>
            </div>
        </div>
    </div>

    <div id="tab-transfer" class="tab-content">
        <div class="team-title">TRANSFER BOZORI</div>
        <p style="text-align: center; margin-top: 50px;">Tez orada yangi o'yinchilar...</p>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-nav" onclick="switchTab('tab-team', this)">
            <img src="500.jpg" class="nav-icon" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0iI2ZmZiI+PHBhdGggZD0iTTEyIDEyYzIuMjEgMCA0LTEuNzkgNC00czEuNzktNCA0LTRtMCA2Yy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2djItYzAtMi42Ni01LjMzLTQtOCA0eiIvPjwvc3ZnPg=='">
            <span>Jamoam</span>
        </div>
        <div class="nav-item" onclick="switchTab('tab-play', this)">
            <img src="503.png" class="nav-icon" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0iI2ZmZiI+PHBhdGggZD0iTTEyIDJDMiAyIDIuNSAzIDIuNSAzcy0uNS41LTEuNS41UzAgMi41IDAgMi41em0wIDE4YzUuNTIgMCAxMC00LjQ4IDEwLTEwUzE3LjUyIDIgMTIgMiAyIDYuNDggMiAxMnM0LjQ4IDEwIDEwIDEweiIvPjwvc3ZnPg=='">
            <span>O'ynash</span>
        </div>
        <div class="nav-item" onclick="switchTab('tab-transfer', this)">
            <img src="502.jpg" class="nav-icon" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0iI2ZmZiI+PHBhdGggZD0iTTE1IDNINnYxOGg5bTQtM2wtNC00bTQgNGwtNCBtbS00LTR2OGg4di04SDExeiIvPjwvc3ZnPg=='">
            <span>Transfer</span>
        </div>
    </div>

    <script>
        // --- 1. BO'LIMLARNI ALMASHTIRISH (TABS) ---
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active-tab');
            
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active-nav'));
            element.classList.add('active-nav');
        }

        // --- 2. O'YIN LOGIKASI VA TUGMALAR ---
        let hasBall = true;
        function updateButtons() {
            document.getElementById('label-A').innerText = hasBall ? "Shoot" : "Tackle";
            document.getElementById('label-B').innerText = hasBall ? "Pass" : "Press";
            document.getElementById('btn-A').style.borderColor = hasBall ? "rgba(231, 76, 60, 0.8)" : "rgba(241, 196, 15, 0.8)";
        }
        function actionBtn(btnType) {
            hasBall = !hasBall; // Test uchun har bosganda to'p o'zgaradi
            updateButtons();
            
            // To'pni uzatish yoki zarba animatsiyasi uchun (Oddiy test)
            const ball = document.getElementById('match-ball');
            if(btnType === 'A') ball.style.top = '10%'; // Darvozaga tepish
            setTimeout(() => ball.style.top = '50%', 1000); // Qaytarish
        }

        // --- 3. JOYSTICK VA O'YINCHINI BOSHQARISH ---
        const joyArea = document.getElementById('joystick-area');
        const joyKnob = document.getElementById('joystick-knob');
        const activePlayer = document.getElementById('active-player');
        
        let isDragging = false;
        let joyCenterX, joyCenterY;
        const maxRadius = 35; // Joystick qanchalik uzoqqa surilishi mumkin

        // O'yinchining maydondagi joylashuvi (foizda)
        let playerX = 50; 
        let playerY = 55;

        joyArea.addEventListener('touchstart', (e) => {
            isDragging = true;
            const rect = joyArea.getBoundingClientRect();
            joyCenterX = rect.left + rect.width / 2;
            joyCenterY = rect.top + rect.height / 2;
            moveJoystick(e.touches[0].clientX, e.touches[0].clientY);
        });

        joyArea.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault(); // Ekranni qotib qolmasligi uchun
            moveJoystick(e.touches[0].clientX, e.touches[0].clientY);
        });

        joyArea.addEventListener('touchend', () => {
            isDragging = false;
            joyKnob.style.transform = `translate(-50%, -50%)`; // Markazga qaytish
        });

        function moveJoystick(clientX, clientY) {
            let dx = clientX - joyCenterX;
            let dy = clientY - joyCenterY;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            // Joystick doiradan chiqib ketmasligi uchun
            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            // Tugmachani surish
            joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

            // O'yinchini harakatlantirish (Tezlik)
            playerX += dx * 0.05; 
            playerY += dy * 0.05;

            // Maydondan chiqib ketmasligi uchun chegara (0% dan 100% gacha)
            playerX = Math.max(5, Math.min(95, playerX));
            playerY = Math.max(5, Math.min(95, playerY));

            activePlayer.style.left = playerX + "%";
            activePlayer.style.top = playerY + "%";
            
            // Agar to'p o'zimizda bo'lsa, to'p ham o'yinchi bilan yuradi
            if(hasBall) {
                const ball = document.getElementById('match-ball');
                ball.style.left = playerX + "%";
                ball.style.top = (playerY - 4) + "%"; // O'yinchining oldida
            }
        }
    </script>
</body>
